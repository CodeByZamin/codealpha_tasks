<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="music.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="player-container">
        <section class="player-card">
            <header class="player-header">
                <span class="now-playing-tag">Playing</span>
            </header>

            <div class="album-art-container">
                <div class="album-art" id="album-art">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=500&auto=format&fit=crop" alt="Album Cover" id="track-art">
                </div>
            </div>

            <div class="track-details">
                <h1 class="track-title" id="track-title">Song Title</h1>
                <h2 class="track-artist" id="track-artist">Artist Name</h2>
            </div>

            <div class="progress-container">
                <div class="time-displays">
                    <span id="current-time">00:00</span>
                    <span id="total-duration">00:00</span>
                </div>
                <input type="range" id="progress-slider" min="0" max="100" value="0" class="slider">
            </div>

            <div class="controls-container">
                <button id="prev-btn" class="control-btn secondary-btn" title="Previous Track">
                    <i class="fas fa-backward"></i>
                </button>
                <button id="play-btn" class="control-btn main-btn" title="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>
                <button id="next-btn" class="control-btn secondary-btn" title="Next Track">
                    <i class="fas fa-forward"></i>
                </button>
            </div>

            <div class="volume-container">
                <i class="fas fa-volume-down" id="volume-icon"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="80" class="slider">
            </div>
        </section>

        <section class="playlist-container">
            <h3>Queue</h3>
            <ul class="playlist-tracks" id="playlist-tracks"></ul>
        </section>
    </main>

    <audio id="audio-element" preload="metadata"></audio>

    <script src="music.js"></script>
</body>
</html>
